
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risiko - Impostazione giocatore</title>
    <style>

        body{
            background-color: rgb(68, 114, 196);
        }
        #container{
            width: 600px;
            height: 500px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 5%;
        }
        p{
            text-align: center;
        }
        #inputGiocatore{
            width: 200px;
        }
        input{
            width: 200px;
            height: 30px;
        }
        label{
            margin-top: 900px;
            width: 20px;
        }
    </style>
</head>

<body>
    <input type="hidden" id="nGiocatori" value="">
    <div id="container">
        <center>
            <h1>Impostare Giocatore 1</h1>
            
            <div id="giocX">
                <div id="inputGiocatore">
                    <input type="text" placeholder="inserire nome" id="nomeX">
                    <input type="text" placeholder="inserire cognome" id="cognomeX">
                    <input type="text" placeholder="inserire nickname" id="nickX">
                </div>
                <label for="">scegliere il colore</label>
                <select name="" id="colorX">
                    <option value="red">rosso</option>
                    <option value="green">verde</option>
                    <option value="blue">blu</option>
                    <option value="black">nero</option>
                    <option value="yellow">giallo</option>
                    <option value="violet">viola</option>
                </select> <br> <br> <br>
                <button> <a href="Configurazione01.html"> Indietro </a></button>
                <button id="next"> Avanti </button>
                
            </div>
        </center>
    </div>
    <script src="scriptConfigurazioni.js"></script>
